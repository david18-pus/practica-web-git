    <!DOCTYPE html>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Fondo -->
    <div class="bg"></div>

    <!-- Header -->
    <header>
        <div class="cabecera">
            <h1>Practica Git</h1>

            <nav>
                <a href="index.html">Inicio</a>
                <a href="about.html">About us  </a>
            </nav>

            <img src="assets/288432a9-e3a8-4732-a523-765dc35f69af.png" alt="logo">
        </div>
    </header>

    <!-- Formulario -->
    <main class="main">
        <div class="card">
            <h2>Formulario de contacto</h2>

            <form>
                <label>Nombre</label><br>
                <input type="text" placeholder="Tu nombre" required><br><br>

                <label>Email</label><br>
                <input type="email" placeholder="Tu email" required><br><br>

                <label>Mensaje</label><br>
                <textarea placeholder="Escribe tu mensaje" rows="4" required></textarea><br><br>

                <button type="submit">Enviar</button>
            </form>
        </div>
    </main>

</body>
